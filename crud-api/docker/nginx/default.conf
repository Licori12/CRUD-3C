server {
    # Nginx recebe HTTP do host pela porta mapeada no compose.
    listen 80;
    server_name localhost;

    # Somente a pasta public fica exposta como raiz web.
    root /var/www/html/public;
    index index.php;

    # URLs amigaveis como /api/products caem no index.php.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Arquivos PHP sao enviados para o container php na porta 9000.
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
