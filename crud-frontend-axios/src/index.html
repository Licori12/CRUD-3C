<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadados basicos da pagina e suporte responsivo. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products CRUD Axios</title>

    <!-- Ordem: reset, Bootstrap e estilos especificos do projeto. -->
    <link rel="stylesheet" href="styles/reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <!-- Cabecalho simples do sistema. -->
    <header class="bg-dark text-white py-4 mb-4">
        <h1 class="text-center m-0">PHP/JS Products CRUD</h1>
    </header>

    <main class="container">
        <!-- Lista onde render.js injeta os cards dos produtos. -->
        <section class="card p-4 mb-4">
            <h2 class="mb-3">Products</h2>
            <div class="row g-3" id="products"></div>
        </section>

        <!-- Formulario reutilizado para criar e editar produtos. -->
        <section class="card p-4">
            <h2 class="mb-3" id="form-title">Create Product</h2>

            <!-- Alerta preenchido por form.js quando a API retorna erro. -->
            <div id="form-error" class="alert alert-danger d-none" role="alert"></div>

            <form id="product-form" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>

                <div class="col-md-3">
                    <label for="price" class="form-label">Price</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" required>
                </div>

                <div class="col-md-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" min="0" class="form-control" id="stock" name="stock" required>
                </div>

                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-dark flex-fill">Create</button>
                    <button type="button" id="cancel-edit" class="btn btn-outline-secondary" style="display:none;">Cancel</button>
                </div>
            </form>
        </section>
    </main>

    <!-- type=module habilita imports/exports nativos do navegador. -->
    <script type="module" src="app.js"></script>
</body>

</html>
